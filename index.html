<script>
  function calculateGHG() {
    const scDosage = Number(document.getElementById("scDosage").value);
    const scWeeks = Number(document.getElementById("scWeeks").value);

    const ivDoseMgKg = Number(document.getElementById("ivDoseMgKg").value);
    const patientWeight = Number(document.getElementById("patientWeight").value);
    const ivWeeks = Number(document.getElementById("ivWeeks").value);
    const distance = Number(document.getElementById("distance").value);

    const scResult = document.getElementById("scResult");
    const ivResult = document.getElementById("ivResult");
    const differenceResult = document.getElementById("differenceResult");

    const values = [
      scDosage,
      scWeeks,
      ivDoseMgKg,
      patientWeight,
      ivWeeks,
      distance
    ];

    const hasInvalidValue = values.some(value => isNaN(value) || value < 0);

    if (hasInvalidValue || scWeeks === 0 || ivWeeks === 0) {
      scResult.textContent = "Please enter valid positive numbers. The number of weeks must be greater than 0.";
      ivResult.textContent = "Please enter valid positive numbers. The number of weeks must be greater than 0.";
      differenceResult.textContent = "Cannot calculate with invalid values.";
      return;
    }

    const scFrequencyMultiplier = 8 / scWeeks;
    const ivFrequencyMultiplier = 8 / ivWeeks;

    const scGHG =
      (28.9 / 549) * scDosage * scFrequencyMultiplier;

    const ivMedicationGHG =
      (42.15 / 614) * ivDoseMgKg * patientWeight * ivFrequencyMultiplier;

    const ivTravelGHG =
      (22.89 / (54.6 * 1.28)) * (2 * distance) * ivFrequencyMultiplier;

    const ivGHG = 5.26 + ivMedicationGHG + ivTravelGHG;

    const difference = ivGHG - scGHG;

    scResult.textContent = scGHG.toFixed(2) + " kgCO2-eq";
    ivResult.textContent = ivGHG.toFixed(2) + " kgCO2-eq";

    if (difference > 0) {
      differenceResult.textContent =
        "IV administration is " + difference.toFixed(2) + " kgCO2-eq higher than SC administration.";
    } else if (difference < 0) {
      differenceResult.textContent =
        "SC administration is " + Math.abs(difference).toFixed(2) + " kgCO2-eq higher than IV administration.";
    } else {
      differenceResult.textContent =
        "Both administration routes have the same estimated emissions.";
    }
  }
</script>
